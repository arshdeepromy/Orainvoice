# HA Standby Node — second local instance for testing HA replication
# Usage: docker compose -p invoicing-standby -f docker-compose.ha-standby.yml up --build -d
#
# Primary node: http://localhost (port 80)   — existing dev environment
# Standby node: http://localhost:8081        — this compose file
#
# Both share the same codebase but have separate databases, redis, and volumes.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workshoppro
    volumes:
      - standby_pgdata:/var/lib/postgresql/data
      - ./certs/pg/standby/server.crt:/pg-certs/server.crt:ro
      - ./certs/pg/standby/server.key:/pg-certs/server.key:ro
      - ./certs/pg/ca.crt:/pg-certs/ca.crt:ro
      - ./scripts/pg-ssl-entrypoint.sh:/pg-ssl-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/pg-ssl-entrypoint.sh"]
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "idle_in_transaction_session_timeout=30000"
      - "-c"
      - "statement_timeout=30000"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/var/lib/postgresql/ssl/server.crt"
      - "-c"
      - "ssl_key_file=/var/lib/postgresql/ssl/server.key"
      - "-c"
      - "ssl_ca_file=/var/lib/postgresql/ssl/ca.crt"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - standby_redisdata:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.ha-standby
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/workshoppro
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      WATCHFILES_FORCE_POLLING: "true"
      HA_LOCAL_PG_PORT: "5433"
      HA_LOCAL_SSH_PORT: "2223"
    volumes:
      - ./app:/app/app:delegated
      - ./alembic:/app/alembic:delegated
      - ./tests:/app/tests:delegated
      - ./scripts:/app/scripts:delegated
      - standby_uploads:/app/uploads
      - standby_ha_keys:/ha_keys
    ports:
      - "2223:2222"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-exclude "tests/*"
      --reload-exclude "scripts/*"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src:delegated
      - ./frontend/public:/app/public:delegated
      - ./frontend/index.html:/app/index.html:delegated
      - ./frontend/vite.config.ts:/app/vite.config.ts:delegated
      - ./frontend/tsconfig.json:/app/tsconfig.json:delegated
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:delegated
      - ./frontend/postcss.config.js:/app/postcss.config.js:delegated
      - ./frontend/watch-build.sh:/app/watch-build.sh:delegated
      - standby_frontend_dist:/app/dist
    depends_on:
      - app
    command: ["sh", "/app/watch-build.sh"]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - standby_frontend_dist:/usr/share/nginx/frontend:ro
    depends_on:
      - app
      - frontend

volumes:
  standby_pgdata:
  standby_redisdata:
  standby_frontend_dist:
  standby_uploads:
  standby_ha_keys:
