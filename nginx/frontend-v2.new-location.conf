# =============================================================================
# nginx/frontend-v2.new-location.conf  —  Frontend Redesign /new/ block — Task 76
# -----------------------------------------------------------------------------
# OPTIONAL, ADDITIVE nginx `location /new/` snippet that reverse-proxies the
# redesigned SPA (the `frontend-v2` Vite dev server from
# docker-compose.frontend-v2.yml) so it can be tested side-by-side with the
# existing production frontend at:
#
#       http://<gateway-host>/new/
#
# This file is NOT loaded automatically. The live gateway config
# (nginx/nginx.conf) is intentionally LEFT UNTOUCHED. To enable the /new/
# route you copy the `location` blocks below into the existing `server { }`
# block of nginx/nginx.conf (ABOVE the catch-all `location / { }`), add the
# `frontend-v2` upstream near the top of the file, mount the `frontend-v2`
# service on the same network, then reload nginx. See "HOW TO ENABLE" at the
# bottom.
#
# Why a reverse proxy (not static files)?
#   frontend-v2 currently ships as a Vite DEV server (HMR, on-the-fly TS
#   transform) — there is no static `frontend_v2_dist` volume yet, so nginx
#   proxies to the live dev server at http://frontend-v2:5174. The Vite config
#   already sets `base: '/new/'`, so asset URLs resolve under /new/ correctly.
#   (When frontend-v2 graduates to a production static build, swap the proxy
#   for an `alias /usr/share/nginx/frontend-v2/` static block — see note.)
# =============================================================================


# -----------------------------------------------------------------------------
# 1) UPSTREAM  — add this near the existing `upstream backend { ... }` block
#    at the very top of nginx/nginx.conf (http context).
# -----------------------------------------------------------------------------
#
# upstream frontend_v2 {
#     server frontend-v2:5174;
#     keepalive 16;
# }


# -----------------------------------------------------------------------------
# 2) LOCATION BLOCKS — paste inside the existing `server { ... }` block in
#    nginx/nginx.conf, ANYWHERE ABOVE the catch-all `location / { ... }`.
#    (nginx prefix-matching gives the longer `/new/` prefix priority over `/`.)
# -----------------------------------------------------------------------------

# --- Frontend v2 (redesign) — Vite dev server reverse proxy ---
# Vite HMR websocket. Must come before the generic /new/ block so the
# Upgrade/Connection headers are set for the live-reload socket.
location /new/@vite/ {
    proxy_pass http://frontend_v2;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

# Vite's HMR client opens a dedicated websocket; depending on Vite version it
# connects to /new/ with an Upgrade header. Proxy the redesign SPA here.
location /new/ {
    proxy_pass http://frontend_v2;
    proxy_http_version 1.1;

    # Forward websocket upgrade for HMR (harmless for normal GETs).
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;

    # Dev server can be slow on first transform of a new route chunk.
    proxy_read_timeout 120s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 120s;

    # The redesign is a work-in-progress preview surface — never index it.
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
}

# NOTE on the `$connection_upgrade` variable used above:
# add this `map` once in the http context (top of nginx.conf), alongside the
# other `map` blocks, so non-websocket requests don't get a stale Connection
# header:
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      "";
#   }


# -----------------------------------------------------------------------------
# 3) /api/ ROUTING IS UNCHANGED
#    The redesign SPA calls the SAME backend API as the existing frontend
#    (axios baseURL '/api/v1', plus absolute '/api/v2/...'). The existing
#    `location /api/ { proxy_pass http://backend; }` block already handles
#    those requests for ALL origins, including pages served under /new/.
#    No /api changes are required to enable the redesign.
# -----------------------------------------------------------------------------


# =============================================================================
# HOW TO ENABLE (side-by-side preview — does NOT disturb the live frontend)
# -----------------------------------------------------------------------------
# 1. Start the redesign dev server on the shared stack network:
#
#       docker compose \
#         -f docker-compose.yml \
#         -f docker-compose.dev.yml \
#         -f docker-compose.frontend-v2.yml \
#         up -d frontend-v2
#
# 2. Edit nginx/nginx.conf (the live gateway config):
#       a. add the `upstream frontend_v2 { ... }` block from section (1);
#       b. add the `map $http_upgrade $connection_upgrade { ... }` block;
#       c. paste the `location /new/@vite/` + `location /new/` blocks from
#          section (2) into the `server { }` block, ABOVE `location / { }`.
#
# 3. Make the gateway depend on / reach the new container. Either run the
#    `nginx` service from the same layered compose command above, or add
#    `frontend-v2` to the nginx service's `depends_on:` so they share the
#    default compose network and `frontend-v2:5174` resolves.
#
# 4. Reload nginx (no full restart needed):
#
#       docker compose exec nginx nginx -t        # validate config
#       docker compose exec nginx nginx -s reload # apply
#
# 5. Visit  http://<gateway-host>/new/  — the redesigned SPA loads with HMR,
#    while the existing frontend keeps serving every other path unchanged.
#
# -----------------------------------------------------------------------------
# PRODUCTION STATIC BUILD (future — when frontend-v2 cuts over to a built
# artifact instead of the dev server):
#   * Add a `frontend_v2_dist` named volume populated by a build container
#     (mirror the existing `frontend` service's build → frontend_dist flow).
#   * Mount it read-only on nginx:
#       - frontend_v2_dist:/usr/share/nginx/frontend-v2:ro
#   * Replace the proxy `location /new/` above with a static block:
#
#       location /new/assets/ {
#           alias /usr/share/nginx/frontend-v2/assets/;
#           expires 1y;
#           add_header Cache-Control "public, immutable";
#           try_files $uri =404;
#       }
#       location /new/ {
#           alias /usr/share/nginx/frontend-v2/;
#           add_header Cache-Control "no-cache, no-store, must-revalidate";
#           add_header X-Robots-Tag "noindex, nofollow" always;
#           try_files $uri $uri/ /new/index.html;
#       }
#
#     (Vite already builds with `base: '/new/'`, so the emitted index.html and
#      asset URLs are correctly prefixed.)
# =============================================================================
