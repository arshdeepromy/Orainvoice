upstream backend {
    server app:8000;
    keepalive 32;
}

# Preserve X-Forwarded-Proto from upstream (e.g. Cloudflare) if present;
# fall back to $scheme when there is no upstream proxy.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

# Determine X-Robots-Tag based on the ORIGINAL request URI (not rewritten $uri).
# Using a `map` + `add_header` in the default location is the only reliable
# way to set response headers that SURVIVE internal redirects caused by
# `try_files $uri $uri/ /index.html` (SPA fallback).
#
# IMPORTANT: we map against `$request_uri` (the original URI including query
# string) rather than `$uri` — `$uri` changes to `/index.html` after
# try_files rewrites, which would cause every page to match the default.
# A regex `location ~ ...` block also cannot do this — when try_files falls
# back to /index.html, nginx re-enters the `/` location and the regex
# block's `add_header` is lost.
#
# The landing, trades, and privacy pages match the empty-string default
# and therefore get NO X-Robots-Tag header.
map $request_uri $x_robots_tag {
    default                                                                        "";
    # API + backend-proxied paths (also have their own add_header, this is belt-and-braces)
    ~^/api/                                                                        "noindex, nofollow";
    ~^/(docs|redoc)                                                                "noindex, nofollow";
    ~^/openapi\.json                                                               "noindex, nofollow";
    ~^/health                                                                      "noindex, nofollow";
    ~^/ws/                                                                         "noindex, nofollow";
    # Mobile companion app
    ~^/mobile(/|$)                                                                 "noindex, nofollow";
    # Authentication pages
    ~^/(login|signup|mfa-verify|forgot-password|reset-password|verify-email|onboarding)(/|$|\?)    "noindex, nofollow";
    # Authenticated product routes
    ~^/(admin|dashboard|customers|vehicles|invoices|quotes|job-cards|jobs|bookings|inventory|items|catalogue|staff|projects|expenses|accounting|reports|tax|banking|time-tracking|pos|schedule|recurring|purchase-orders|data|progress-claims|variations|retentions|floor-plan|kitchen|franchise|locations|stock-transfers|branch-transfers|claims|staff-schedule|assets|compliance|loyalty|ecommerce|sms|settings|notifications|setup|setup-guide)(/|$|\?)    "noindex, nofollow";
    # Token-based / standalone authenticated surfaces
    ~^/(kiosk|portal|pay)(/|$|\?)                                                  "noindex, nofollow";
}

# Connection and buffer tuning
proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=5m;

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/wasm;

    # Trust X-Forwarded-* headers from upstream reverse proxy
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # Enable proxy buffering for better throughput
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 128k;

    # Keep-alive to backend (reuse connections)
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # --- Backend: Fleet Portal API ---
    # Fleet portal endpoints live at /fleet/api/* and must be proxied
    # to the backend (not served as static SPA files).

    location /fleet/api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;

        # Security headers (Req 23.1, 23.2)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # --- Backend: API ---

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # SEO: API responses must never be indexed by search engines.
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # --- WebSocket ---

    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location /redoc {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # --- Mobile App: static files from shared volume ---

    # Cache hashed assets aggressively (Vite adds content hashes to filenames)
    location /mobile/assets/ {
        alias /usr/share/nginx/mobile/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback for mobile app
    # SEO: the mobile companion app is only useful to authenticated users;
    # the bare web URL should never be indexed.
    location /mobile/ {
        alias /usr/share/nginx/mobile/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ /mobile/index.html;
    }

    # --- Frontend: static files from shared volume ---

    # robots.txt and sitemap.xml — proxied to the backend so the visual
    # page editor can dynamically include published editor pages.
    # The backend regenerates these whenever a page is published, deleted,
    # has its slug changed, or its noindex flag toggled (Requirement 9.6).
    # Cache-Control is set by the backend response; nginx adds a fallback.
    location = /robots.txt {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /sitemap.xml {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # SEO: authenticated SPA paths must carry X-Robots-Tag as defence in depth.
    #
    # We use a `map $uri $x_robots_tag` at the http level (top of this file)
    # and emit the header from the default `location /` block. This is the
    # ONLY reliable pattern for SPA fallback, because `try_files ... /index.html`
    # does an internal redirect that re-enters `location /` and drops headers
    # set by a preceding `location ~` regex block.
    #
    # When the map returns an empty string (e.g. for `/`, `/trades`, `/privacy`),
    # nginx does not emit the header at all.

    # Cache hashed assets aggressively (Vite adds content hashes to filenames)
    # Return 404 for missing files instead of SPA fallback — prevents
    # serving index.html (text/html) for stale JS/CSS requests after rebuilds.
    location /assets/ {
        root /usr/share/nginx/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — serve index.html for all non-API, non-file routes.
    # The X-Robots-Tag header is set via the $x_robots_tag map at the top
    # of this config: authenticated / auth / token-based routes get
    # "noindex, nofollow"; public marketing routes (/, /trades, /privacy)
    # match the default empty-string and no header is emitted.
    location / {
        root /usr/share/nginx/frontend;
        # Don't cache index.html — browser must always get the latest version
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Robots-Tag $x_robots_tag always;
        try_files $uri $uri/ /index.html;
    }
}
