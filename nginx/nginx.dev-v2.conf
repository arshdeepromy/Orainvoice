# =============================================================================
# nginx/nginx.dev-v2.conf  —  LOCAL DEV gateway: frontend-v2 served at root /
# -----------------------------------------------------------------------------
# This config makes the REDESIGN (frontend-v2) the live frontend behind the
# gateway on http://localhost/ for LOCAL DEVELOPMENT ONLY. It is loaded via
# docker-compose.dev-v2.yml, which mounts it over the nginx default config.
#
# The frontend-v2 SPA is served at the gateway root `/` (Vite base: '/'). The
# previous `/new/` preview prefix has been removed so public/token routes
# (/pay/{token}, /portal/{token}, /public/staff-roster/{token},
# /payments/qr-success, etc.) work correctly from email/QR links — these are
# SPA routes inside frontend-v2's router. All backend API/WebSocket/mobile
# routes are unchanged from nginx/nginx.conf.
#
# The OLD frontend (frontend/) is NOT served here — it is archived. The
# canonical production config (nginx/nginx.conf) is left untouched; revert by
# simply not passing docker-compose.dev-v2.yml.
# =============================================================================

upstream backend {
    server app:8000;
    keepalive 32;
}

# Redesign dev server (Vite) — resolved on the compose network.
upstream frontend_v2 {
    server frontend-v2:5174;
    keepalive 16;
}

# Preserve X-Forwarded-Proto from an upstream proxy if present; else $scheme.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

# Websocket upgrade helper for Vite HMR.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=5m;

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;
    client_body_buffer_size 128k;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/wasm;

    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 128k;

    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # --- Backend: Fleet Portal API (unchanged) ---
    location /fleet/api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # --- Backend: API (unchanged) ---
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # --- WebSocket (backend, unchanged) ---
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location /redoc {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location = /robots.txt {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /sitemap.xml {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # --- Mobile App: static files from shared volume (unchanged) ---
    location /mobile/assets/ {
        alias /usr/share/nginx/mobile/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /mobile/ {
        alias /usr/share/nginx/mobile/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ /mobile/index.html;
    }

    # Neutralise any stale service worker registered by the OLD frontend so it
    # cannot keep serving archived assets from the browser cache.
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        return 404;
    }

    # --- Vite HMR websocket (frontend-v2) — declare BEFORE the catch-all `/`. ---
    location /@vite/ {
        proxy_pass http://frontend_v2;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Frontend-v2 SPA at root: handles every non-API path including
    #     /pay/{token}, /portal/{token}, /public/staff-roster/{token},
    #     /payments/qr-success, /payments/qr-cancel, /login, /signup,
    #     /dashboard, /invoices, etc. (the v2 router owns all of these). ---
    location / {
        proxy_pass http://frontend_v2;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 120s;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
