# =============================================================================
# nginx/nginx.pi-v2.conf  —  Pi PROD gateway: frontend-v2 (STATIC BUILD) at /
# -----------------------------------------------------------------------------
# This config serves the REDESIGN (frontend-v2) as a STATIC PRODUCTION BUILD
# on http://<pi>:8998/ alongside the legacy frontend on :8999. It is loaded
# via docker-compose.pi-v2.yml on the `nginx-v2` service.
#
# Differences from nginx.dev-v2.conf:
#   * No `upstream frontend_v2` block — there is no Vite dev server on prod.
#   * No `/@vite/` HMR location — production has no HMR.
#   * The `/` location serves static files from /usr/share/nginx/frontend-v2
#     (mounted from the `frontend_v2_pi_dist` named volume populated by the
#     one-shot `frontend-v2-build` container) with SPA fallback to index.html.
#   * Hashed assets under /assets/ get long-lived immutable cache; index.html
#     and the HTML shell are no-cache so deploys take effect immediately.
#
# Backend proxy blocks (/api, /fleet/api, /ws, /health, /docs, /redoc,
# /openapi.json, /robots.txt, /sitemap.xml, /mobile) are IDENTICAL to the
# dev-v2 conf — they all proxy to the SHARED `app` upstream so the v2 stack
# does not need its own backend container.
#
# The legacy nginx (port 8999) is NOT touched by this file. Both servers run
# concurrently against the same backend; cutover is at the Cloudflare Tunnel
# ingress layer.
# =============================================================================

upstream backend {
    server app:8000;
    keepalive 32;
}

# Preserve X-Forwarded-Proto from an upstream proxy if present; else $scheme.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

# Websocket upgrade helper (used by /ws/ to backend).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=5m;

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;
    client_body_buffer_size 128k;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        application/wasm;

    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 128k;

    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # --- Backend: Fleet Portal API (unchanged) ---
    location /fleet/api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # --- Backend: Employee Portal API ---
    # Portal endpoints live at /e/api/* and must be proxied to the backend.
    # Without this block, /e/api/ falls through to `location /` and is served
    # the SPA index.html instead of reaching the backend (mirrors /fleet/api/).
    location /e/api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # --- Backend: API (unchanged) ---
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # --- WebSocket (backend, unchanged) ---
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location /redoc {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location = /robots.txt {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /sitemap.xml {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # --- Mobile App: static files from shared volume (unchanged) ---
    location /mobile/assets/ {
        alias /usr/share/nginx/mobile/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /mobile/ {
        alias /usr/share/nginx/mobile/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ /mobile/index.html;
    }

    # Neutralise any stale service worker registered by the OLD frontend so it
    # cannot keep serving archived assets from the browser cache.
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        return 404;
    }

    # --- Frontend-v2 SPA: STATIC PRODUCTION BUILD ---
    # Hashed assets under /assets/ are content-addressed by Vite — safe to
    # cache forever. Everything else (index.html, favicon, manifest) is
    # served no-cache so deploys take effect on next request.
    root /usr/share/nginx/frontend-v2;

    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    # SPA catch-all — handles /pay/{token}, /portal/{token},
    # /public/staff-roster/{token}, /payments/qr-success, /login, /signup,
    # /dashboard, /invoices, etc. The v2 router owns all of these.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
