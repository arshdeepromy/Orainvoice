<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../ds.css" />
<link rel="stylesheet" href="fleet.css" />
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="main">
    <div id="topbar"></div>
    <main class="content">
      <div class="page" data-screen-label="Fleet portal security">
        <div class="page-head"><div><h1>Security</h1><p class="sub">Password, two-factor &amp; active sessions</p></div></div>
        <div style="max-width:640px;display:flex;flex-direction:column;gap:var(--gap)">
          <section class="card"><div class="card-body">
            <div class="section-label">Change password</div>
            <div class="form-grid" style="grid-template-columns:1fr">
              <div class="field"><label>Current password</label><input class="input" type="password" placeholder="••••••••"></div>
              <div class="field"><label>New password</label><input class="input" type="password" placeholder="••••••••"></div>
            </div>
            <button class="btn btn-ghost btn-sm" style="margin-top:14px" onclick="toast('Password updated.')">Update password</button>
          </div></section>
          <section class="card"><div class="card-body">
            <div style="display:flex;align-items:center;justify-content:space-between"><div><div class="section-label" style="margin:0">Two-factor authentication</div><p style="font-size:12.5px;color:var(--muted);margin:6px 0 0">Authenticator app · enrolled</p></div><span class="badge active"><span class="b-dot"></span>On</span></div>
            <div style="display:flex;gap:10px;margin-top:14px"><button class="btn btn-ghost btn-sm">Re-enrol</button><button class="btn btn-ghost btn-sm">View backup codes</button></div>
          </div></section>
          <section class="card">
            <div class="card-head"><h2>Active sessions</h2><button class="btn btn-quiet btn-sm" style="color:var(--danger)" onclick="toast('Signed out of all other devices.')">Sign out all</button></div>
            <div class="card-body" style="padding:8px 10px">
              <div class="meta-row" style="padding:13px 12px"><span class="k" style="display:flex;align-items:center;gap:10px"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="var(--muted)" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/></svg>Chrome · macOS <span class="badge active" style="margin-left:4px">This device</span></span><span class="v mono" style="font-weight:400;color:var(--muted)">Kerikeri · now</span></div>
              <div class="meta-row" style="padding:13px 12px;border-bottom:none"><span class="k" style="display:flex;align-items:center;gap:10px"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="var(--muted)" stroke-width="1.8"><rect x="7" y="2" width="10" height="20" rx="2"/></svg>Safari · iPhone</span><span class="v mono" style="font-weight:400;color:var(--muted)">Whangarei · 3h ago</span></div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>
</div>
<div class="toast ok" id="toast"></div>
<script src="fleet-shell.js" data-active="security" data-title="Security"></script>
<script>let tt;function toast(m){const t=document.getElementById('toast');t.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span>'+m+'</span>';t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2400);}</script>
</body>
</html>
