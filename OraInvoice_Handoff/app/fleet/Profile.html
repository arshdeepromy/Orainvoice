<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../ds.css" />
<link rel="stylesheet" href="fleet.css" />
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="main">
    <div id="topbar"></div>
    <main class="content">
      <div class="page" data-screen-label="Fleet portal profile">
        <div class="page-head"><div><h1>My profile</h1><p class="sub">Your account details &amp; preferences</p></div><div class="head-actions"><button class="btn btn-primary btn-sm" onclick="toast('Profile saved.')">Save changes</button></div></div>
        <div style="max-width:640px;display:flex;flex-direction:column;gap:var(--gap)">
          <section class="card"><div class="card-body">
            <div class="section-label">Personal details</div>
            <div class="form-grid">
              <div class="field"><label>Full name</label><input class="input" value="Dean Whaitiri"></div>
              <div class="field"><label>Phone</label><input class="input mono" value="021 552 0099"></div>
              <div class="field full"><label>Email</label><input class="input" value="dean@northlandfreight.co.nz" disabled style="color:var(--muted)"><div class="hint">Contact your fleet admin to change your email.</div></div>
            </div>
          </div></section>
          <section class="card"><div class="card-body">
            <div class="section-label">Notification preferences</div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)"><div style="font-size:13.5px;font-weight:500">Checklist failure alerts</div><button class="toggle on" onclick="this.classList.toggle('on')"></button></div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)"><div style="font-size:13.5px;font-weight:500">Expiry reminders</div><button class="toggle on" onclick="this.classList.toggle('on')"></button></div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0"><div style="font-size:13.5px;font-weight:500">Quote &amp; booking updates</div><button class="toggle on" onclick="this.classList.toggle('on')"></button></div>
          </div></section>
        </div>
      </div>
    </main>
  </div>
</div>
<div class="toast ok" id="toast"></div>
<script src="fleet-shell.js" data-active="profile" data-title="My profile"></script>
<script>let tt;function toast(m){const t=document.getElementById('toast');t.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span>'+m+'</span>';t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2400);}</script>
</body>
</html>
