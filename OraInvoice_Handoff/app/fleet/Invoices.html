<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../ds.css" />
<link rel="stylesheet" href="fleet.css" />
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="main">
    <div id="topbar"></div>
    <main class="content">
      <div class="page page-wide" data-screen-label="Fleet portal invoices">
        <div class="page-head"><div><h1>Invoices</h1><p class="sub">Billing from the workshop</p></div></div>
        <div class="kpis" style="grid-template-columns:repeat(3,1fr)">
          <div class="kpi"><div class="top"><span class="label">Outstanding</span></div><div class="val"><span class="c">$</span>5,251</div></div>
          <div class="kpi"><div class="top"><span class="label">Overdue</span></div><div class="val" style="color:var(--danger)"><span class="c">$</span>1,240</div></div>
          <div class="kpi"><div class="top"><span class="label">Paid (YTD)</span></div><div class="val" style="color:var(--ok)"><span class="c">$</span>48,920</div></div>
        </div>
        <section class="card"><div class="tbl-wrap"><table>
          <thead><tr><th>Invoice</th><th>Date</th><th>Vehicle</th><th class="r">Amount</th><th>Status</th><th class="r"></th></tr></thead>
          <tbody>
            <tr><td><span class="id">INV-2039</span></td><td class="mono" style="color:var(--muted)">12 Aug</td><td class="mono">NPR-447</td><td class="r mono" style="font-weight:600">$4,011.50</td><td><span class="badge overdue"><span class="b-dot"></span>Overdue</span></td><td class="r"><button class="btn btn-primary btn-sm" onclick="toast('Opening payment…')">Pay now</button></td></tr>
            <tr><td><span class="id">INV-2031</span></td><td class="mono" style="color:var(--muted)">28 Oct</td><td class="mono">JDC-991</td><td class="r mono" style="font-weight:600">$1,240.00</td><td><span class="badge sent"><span class="b-dot"></span>Sent</span></td><td class="r"><button class="btn btn-primary btn-sm" onclick="toast('Opening payment…')">Pay now</button></td></tr>
            <tr><td><span class="id">INV-2018</span></td><td class="mono" style="color:var(--muted)">04 Oct</td><td class="mono">HBR-440</td><td class="r mono" style="font-weight:600">$2,480.00</td><td><span class="badge paid"><span class="b-dot"></span>Paid</span></td><td class="r"><button class="btn btn-quiet btn-sm">Receipt</button></td></tr>
          </tbody>
        </table></div></section>
      </div>
    </main>
  </div>
</div>
<div class="toast ok" id="toast"></div>
<script src="fleet-shell.js" data-active="invoices" data-title="Invoices"></script>
<script>let tt;function toast(m){const t=document.getElementById('toast');t.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span>'+m+'</span>';t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2400);}</script>
</body>
</html>
