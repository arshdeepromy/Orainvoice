<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../ds.css" />
<link rel="stylesheet" href="fleet.css" />
<title>Set new password · Fleet Portal</title>
</head>
<body>
<div class="fauth" data-screen-label="Fleet portal reset password">
  <form class="fauth-card" onsubmit="event.preventDefault();location.href='Login.html'">
    <div class="fauth-brand"><div class="m"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 11h14a2 2 0 012 2v7a2 2 0 01-2 2H5a2 2 0 01-2-2v-7a2 2 0 012-2zm2 0V7a5 5 0 0110 0v4"/></svg></div><div class="t">Fleet<span> Portal</span></div></div>
    <h1>Set a new password</h1>
    <p class="sub">Choose a strong password for dean@northlandfreight.co.nz.</p>
    <div class="field"><label>New password</label><input class="input" type="password" value="············"></div>
    <div class="progress" style="margin:-6px 0 4px"><i style="width:80%;background:var(--ok)"></i></div>
    <div class="hint" style="font-size:11.5px;color:var(--muted);margin-bottom:14px">Strong · 8+ chars with a number &amp; symbol</div>
    <div class="field"><label>Confirm password</label><input class="input" type="password" value="············"></div>
    <button class="btn btn-primary btn-block" type="submit" style="margin-top:6px">Reset password</button>
    <div class="fauth-foot"><a href="Login.html" style="color:var(--muted)">← Back to sign in</a></div>
  </form>
  <div class="fauth-foot" style="margin-top:18px">Powered by <b style="color:var(--muted)">OraInvoice</b></div>
</div>
</body>
</html>
