<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../ds.css" />
<link rel="stylesheet" href="fleet.css" />
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="main">
    <div id="topbar"></div>
    <main class="content">
      <div class="page page-wide" data-screen-label="Fleet portal quotes">
        <div class="page-head"><div><h1>Quotes</h1><p class="sub">Estimates from the workshop awaiting your approval</p></div></div>
        <section class="card"><div class="tbl-wrap"><table>
          <thead><tr><th>Quote</th><th>Vehicle</th><th>Service</th><th class="r">Total</th><th>Status</th><th class="r"></th></tr></thead>
          <tbody>
            <tr><td><span class="id">QT-318</span></td><td class="mono" style="font-weight:600">NPR-447</td><td>Full service + brake inspection</td><td class="r mono" style="font-weight:600">$1,260.00</td><td><span class="badge sent"><span class="b-dot"></span>Awaiting you</span></td><td class="r"><button class="btn btn-primary btn-sm" onclick="toast('Quote accepted.')">Accept</button></td></tr>
            <tr><td><span class="id">QT-309</span></td><td class="mono" style="font-weight:600">HBR-012</td><td>Cambelt replacement</td><td class="r mono" style="font-weight:600">$2,480.00</td><td><span class="badge paid"><span class="b-dot"></span>Accepted</span></td><td class="r"><button class="btn btn-quiet btn-sm">View</button></td></tr>
            <tr><td><span class="id">QT-301</span></td><td class="mono" style="font-weight:600">JDC-118</td><td>Annual service</td><td class="r mono" style="font-weight:600">$640.00</td><td><span class="badge overdue"><span class="b-dot"></span>Declined</span></td><td class="r"><button class="btn btn-quiet btn-sm">View</button></td></tr>
          </tbody>
        </table></div></section>
      </div>
    </main>
  </div>
</div>
<div class="toast ok" id="toast"></div>
<script src="fleet-shell.js" data-active="quotes" data-title="Quotes"></script>
<script>let tt;function toast(m){const t=document.getElementById('toast');t.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span>'+m+'</span>';t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2400);}</script>
</body>
</html>
