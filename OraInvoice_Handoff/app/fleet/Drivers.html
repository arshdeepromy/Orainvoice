<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../ds.css" />
<link rel="stylesheet" href="fleet.css" />
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="main">
    <div id="topbar"></div>
    <main class="content">
      <div class="page page-wide" data-screen-label="Fleet portal drivers">
        <div class="page-head"><div><h1>Drivers</h1><p class="sub">People who run pre-trip checks on your fleet</p></div><div class="head-actions"><button class="btn btn-primary btn-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>Invite driver</button></div></div>
        <section class="card"><div class="tbl-wrap"><table>
          <thead><tr><th>Driver</th><th>Email</th><th class="r">Vehicles</th><th>Last checklist</th><th>Status</th></tr></thead>
          <tbody id="rows"></tbody>
        </table></div></section>
      </div>
    </main>
  </div>
</div>
<script src="fleet-shell.js" data-active="drivers" data-title="Drivers"></script>
<script>
const D=[
  {n:'Tane Edwards',e:'tane@northlandfreight.co.nz',v:3,last:'Today',active:true},
  {n:'Mere Reti',e:'mere@northlandfreight.co.nz',v:2,last:'Today',active:true},
  {n:'Simran Kaur',e:'simran@northlandfreight.co.nz',v:4,last:'Yesterday',active:true},
  {n:'Aaron Wills',e:'aaron@northlandfreight.co.nz',v:2,last:'5 days ago',active:false},
];
function av(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('');}
document.getElementById('rows').innerHTML=D.map(d=>`<tr class="clickable" onclick="location.href='DriverDetail.html'">
  <td><div class="row-flex"><span class="row-av">${av(d.n)}</span><span class="cust">${d.n}</span></div></td>
  <td><span style="color:var(--muted)">${d.e}</span></td>
  <td class="r mono">${d.v}</td>
  <td class="mono" style="color:var(--muted)">${d.last}</td>
  <td>${d.active?'<span class="badge active"><span class="b-dot"></span>Active</span>':'<span class="badge draft"><span class="b-dot"></span>Inactive</span>'}</td>
</tr>`).join('');
</script>
</body>
</html>
