<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../ds.css" />
<link rel="stylesheet" href="fleet.css" />
<title>Forgot password · Fleet Portal</title>
</head>
<body>
<div class="fauth" data-screen-label="Fleet portal forgot password">
  <form class="fauth-card" id="reqForm" onsubmit="event.preventDefault();document.getElementById('reqForm').style.display='none';document.getElementById('sentCard').style.display='block'">
    <div class="fauth-brand"><div class="m"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 11l1.5-4.5A2 2 0 018.4 5h7.2a2 2 0 011.9 1.5L19 11m-14 0h14"/></svg></div><div class="t">Fleet<span> Portal</span></div></div>
    <h1>Reset your password</h1>
    <p class="sub">Enter your email and we'll send a reset link.</p>
    <div class="field"><label>Email</label><input class="input" type="email" placeholder="you@fleet.co.nz" autocomplete="email"></div>
    <button class="btn btn-primary btn-block" type="submit" style="margin-top:6px">Send reset link</button>
    <div class="fauth-foot"><a href="Login.html" style="color:var(--muted)">← Back to sign in</a></div>
  </form>

  <div class="fauth-card" id="sentCard" style="display:none;text-align:center">
    <div style="width:54px;height:54px;border-radius:50%;background:var(--ok-soft);display:grid;place-items:center;margin:0 auto 16px"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="var(--ok)" stroke-width="2"><path d="M3 8l9 6 9-6M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg></div>
    <h1>Check your inbox</h1>
    <p class="sub" style="margin-bottom:0">If an account exists for that email, we've sent a reset link. It expires in 60 minutes.</p>
    <a class="btn btn-ghost btn-block" href="Login.html" style="margin-top:22px">Back to sign in</a>
  </div>

  <div class="fauth-foot" style="margin-top:18px">Powered by <b style="color:var(--muted)">OraInvoice</b></div>
</div>
</body>
</html>
