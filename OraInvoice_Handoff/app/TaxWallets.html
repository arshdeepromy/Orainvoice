<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="ds.css" />
</head>
<body>
<div class="app"><div id="sidebar"></div><div class="main"><div id="topbar"></div>
<main class="content"><div class="page page-wide" data-screen-label="Tax wallets">
<div class="page-head"><div><div class="eyebrow">Money</div><h1>Tax wallets</h1><p class="sub">Set aside funds for tax</p></div><div class="head-actions"><button class="btn btn-primary btn-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>Transfer</button></div></div>
<section class="card"><div class="tbl-wrap"><table><thead><tr><th class="">Wallet</th><th class="r">Target</th><th class="r">Balance</th><th class="">Progress</th></tr></thead><tbody><tr class="" ><td class=""><span class="cust">GST</span></td><td class="r"><span class="amt">$4,273</span></td><td class="r"><span class="amt">$4,273</span></td><td class=""><div class="progress" style="width:120px"><i style="width:100%;background:var(--ok)"></i></div></td></tr><tr class="" ><td class=""><span class="cust">Provisional tax</span></td><td class="r"><span class="amt">$6,200</span></td><td class="r"><span class="amt">$4,100</span></td><td class=""><div class="progress" style="width:120px"><i style="width:66%"></i></div></td></tr></tbody></table></div></section>
</div></main></div></div>
<script src="shell.js" data-active="tax" data-title="Tax wallets" data-primary="Transfer"></script>
<script>
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');}));
</script>
</body></html>
