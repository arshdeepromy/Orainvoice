<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="ds.css" />
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="main">
    <div id="topbar"></div>
    <main class="content">
      <div class="page page-wide" data-screen-label="Fleet bookings">
        <div class="page-head"><div><div class="eyebrow">B2B · Fleet portal</div><h1>Fleet bookings</h1><p class="sub">Booking requests from fleet accounts</p></div></div>
        <div class="tabs">
          <a class="tab" href="FleetPortalAdmin.html">Overview</a>
          <a class="tab on" href="FleetBookings.html">Bookings</a>
          <a class="tab" href="FleetQuotes.html">Quotes</a>
          <a class="tab" href="FleetAccounts.html">Accounts</a>
          <a class="tab" href="FleetChecklistFailures.html">Checklist fails</a>
          <a class="tab" href="FleetPortalSettings.html">Settings</a>
        </div>
        <div class="seg" style="margin-bottom:22px"><button class="on">Pending</button><button>Confirmed</button><button>Completed</button></div>
<section class="card"><div class="tbl-wrap"><table><thead><tr><th class="">Request</th><th class="">Account</th><th class="">Vehicle</th><th class="">Requested</th><th class="">Status</th></tr></thead><tbody><tr class="" ><td class=""><span class="id">FB-88</span></td><td class="">Northland Freight</td><td class=""><span class="mono" style="color:var(--muted)">NPR-447</span></td><td class=""><span class="mono" style="color:var(--muted)">14 Nov</span></td><td class=""><span class="badge pending"><span class="b-dot"></span>Pending</span></td></tr><tr class="" ><td class=""><span class="id">FB-87</span></td><td class="">Coastal Builders</td><td class=""><span class="mono" style="color:var(--muted)">JDC-991</span></td><td class=""><span class="mono" style="color:var(--muted)">15 Nov</span></td><td class=""><span class="badge inprogress"><span class="b-dot"></span>Confirmed</span></td></tr></tbody></table></div></section>
      </div>
    </main>
  </div>
</div>
<script src="shell.js" data-active="" data-title="Fleet bookings"></script>
<script>
document.querySelectorAll('.seg button').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('on'));t.classList.add('on');}));
</script>
</body>
</html>
