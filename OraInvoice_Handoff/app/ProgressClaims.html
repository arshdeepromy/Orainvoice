<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="ds.css" />
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="main">
    <div id="topbar"></div>
    <main class="content">
      <div class="page page-wide" data-screen-label="Progress claims">
        <div class="page-head"><div><div class="eyebrow">Construction</div><h1>Progress claims</h1><p class="sub">Payment claims under CCA 2002</p></div><div class="head-actions"><button class="btn btn-primary btn-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>New claim</button></div></div>
<section class="card"><div class="tbl-wrap"><table><thead><tr><th class="">Claim</th><th class="">Project</th><th class="">Period</th><th class="r">Claimed</th><th class="r">Certified</th><th class="">Status</th></tr></thead><tbody><tr class="" ><td class=""><span class="id">PC-08</span></td><td class=""><span class="cust">Workshop fit-out</span></td><td class=""><span class="mono" style="color:var(--muted)">Oct</span></td><td class="r"><span class="amt">$24,000</span></td><td class="r"><span class="amt">$22,400</span></td><td class=""><span class="badge success"><span class="b-dot"></span>Certified</span></td></tr><tr class="" ><td class=""><span class="id">PC-07</span></td><td class=""><span class="cust">Site machinery</span></td><td class=""><span class="mono" style="color:var(--muted)">Oct</span></td><td class="r"><span class="amt">$12,500</span></td><td class="r"><span class="amt">—</span></td><td class=""><span class="badge pending"><span class="b-dot"></span>Submitted</span></td></tr></tbody></table></div></section>
      </div>
    </main>
  </div>
</div>
<script src="shell.js" data-active="" data-title="Progress claims" data-primary="New claim"></script>
<script>
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');}));
</script>
</body>
</html>
