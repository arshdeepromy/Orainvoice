<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="ds.css" />
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="main">
    <div id="topbar"></div>
    <main class="content">
      <div class="page " data-screen-label="Loyalty">
        <div class="page-head"><div><div class="eyebrow">Marketing</div><h1>Loyalty programme</h1><p class="sub">Points & rewards configuration</p></div></div>
        <div class="kpis"><div class="kpi"><div class="top"><span class="label">Members</span></div><div class="val" >1,840</div></div><div class="kpi"><div class="top"><span class="label">Points issued</span></div><div class="val" >284k</div></div><div class="kpi"><div class="top"><span class="label">Redeemed (MTD)</span></div><div class="val" >$1,240</div></div><div class="kpi"><div class="top"><span class="label">Active rewards</span></div><div class="val" >6</div></div></div>
  <section class="card" style="margin-top:0"><div class="card-body"><div class="section-label">Earning rules</div>
  <div class="set-row" style="display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:13.5px;font-weight:600">Points per $1 spent</div><div style="font-size:12.5px;color:var(--muted);margin-top:2px">Earned on paid invoices</div></div><div class="input-group" style="width:90px"><input class="mono" value="1" style="text-align:center"></div></div>
  <div class="set-row" style="display:flex;align-items:center;justify-content:space-between;padding:16px 0"><div><div style="font-size:13.5px;font-weight:600">Birthday bonus</div></div><button class="toggle on"></button></div>
  </div></section>
      </div>
    </main>
  </div>
</div>
<script src="shell.js" data-active="" data-title="Loyalty"></script>
</body>
</html>
