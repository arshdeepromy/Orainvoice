<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="ds.css" />
</head>
<body>
<div class="app"><div id="sidebar"></div><div class="main"><div id="topbar"></div>
<main class="content"><div class="page page-wide" data-screen-label="Accounting periods">
<div class="page-head"><div><div class="eyebrow">Money</div><h1>Accounting periods</h1><p class="sub">Lock periods to prevent changes</p></div></div>
<section class="card"><div class="tbl-wrap"><table><thead><tr><th class="">Period</th><th class="">Status</th><th class="">Closed by</th><th class="r"></th></tr></thead><tbody><tr class="" ><td class=""><span class="cust">Oct 2025</span></td><td class=""><span class="badge neutral"><span class="b-dot"></span>Open</span></td><td class=""><span class="mono" style="color:var(--muted)">—</span></td><td class="r"><button class="btn btn-ghost btn-sm">Lock</button></td></tr><tr class="" ><td class=""><span class="cust">Sep 2025</span></td><td class=""><span class="badge success"><span class="b-dot"></span>Locked</span></td><td class=""><span class="mono" style="color:var(--muted)">Arsh · 02 Oct</span></td><td class="r"></td></tr><tr class="" ><td class=""><span class="cust">Aug 2025</span></td><td class=""><span class="badge success"><span class="b-dot"></span>Locked</span></td><td class=""><span class="mono" style="color:var(--muted)">Arsh · 03 Sep</span></td><td class="r"></td></tr></tbody></table></div></section>
</div></main></div></div>
<script src="shell.js" data-active="accounting" data-title="Accounting periods"></script>
<script>
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');}));
</script>
</body></html>
