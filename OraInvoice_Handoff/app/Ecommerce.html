<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="ds.css" />
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="main">
    <div id="topbar"></div>
    <main class="content">
      <div class="page " data-screen-label="Ecommerce">
        <div class="page-head"><div><div class="eyebrow">Integrations</div><h1>WooCommerce</h1><p class="sub">Sync products, orders & stock with your store</p></div></div>
  <section class="card"><div class="card-body" style="display:flex;align-items:center;gap:14px"><div class="ico green" style="width:44px;height:44px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><div style="flex:1"><div style="font-size:14px;font-weight:600">Connected to store.kerikerimotors.co.nz</div><div style="font-size:12.5px;color:var(--muted)">Last sync 4 minutes ago · 480 products</div></div><button class="btn btn-ghost btn-sm">Sync now</button></div></section>
  <div class="kpis" style="margin-top:var(--gap)"><div class="kpi"><div class="top"><span class="label">Products synced</span></div><div class="val">480</div></div><div class="kpi"><div class="top"><span class="label">Online orders (MTD)</span></div><div class="val">62</div></div><div class="kpi"><div class="top"><span class="label">Online revenue</span></div><div class="val"><span class="c">$</span>8,420</div></div><div class="kpi"><div class="top"><span class="label">Sync errors</span></div><div class="val">0</div></div></div>
      </div>
    </main>
  </div>
</div>
<script src="shell.js" data-active="" data-title="Ecommerce"></script>
</body>
</html>
