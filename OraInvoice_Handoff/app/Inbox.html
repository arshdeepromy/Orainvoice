<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="ds.css" />
</head>
<body>
<div class="app"><div id="sidebar"></div><div class="main"><div id="topbar"></div>
<main class="content"><div class="page page-wide" data-screen-label="Inbox">
<div class="page-head"><div><div class="eyebrow">Messages</div><h1>Inbox</h1><p class="sub">Customer messages & email threads</p></div></div>
<div class="tabs"><div class="tab on">All</div><div class="tab ">Unread</div><div class="tab ">Sent</div></div>
<section class="card"><div class="tbl-wrap"><table><thead><tr><th class="">From</th><th class="">Subject</th><th class="">Received</th><th class="">Status</th></tr></thead><tbody><tr class="" ><td class=""><span class="cust">accounts@nlfreight.co.nz</span></td><td class="">Re: INV-2039 payment</td><td class=""><span class="mono" style="color:var(--muted)">12m</span></td><td class=""><span class="badge info"><span class="b-dot"></span>New</span></td></tr><tr class="" ><td class=""><span class="cust">M. Taufa</span></td><td class="">Reschedule WOF?</td><td class=""><span class="mono" style="color:var(--muted)">2h</span></td><td class=""><span class="badge neutral"><span class="b-dot"></span>Read</span></td></tr></tbody></table></div></section>
</div></main></div></div>
<script src="shell.js" data-active="" data-title="Inbox"></script>
<script>
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');}));
</script>
</body></html>
