<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="ds.css" />
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="main">
    <div id="topbar"></div>
    <main class="content">
      <div class="page page-wide" data-screen-label="Customers">
        <div class="page-head">
          <div><div class="eyebrow">People</div><h1>Customers</h1><p class="sub">312 customers · 18 with open balances</p></div>
          <div class="head-actions">
            <button class="btn btn-ghost btn-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3"/></svg>Import</button>
            <a class="btn btn-primary btn-sm" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>New customer</a>
          </div>
        </div>
        <div class="toolbar">
          <div class="search-input" style="flex:1;max-width:340px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-5-5m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input placeholder="Search name, email or phone…" /></div>
          <button class="filter-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4h18M6 12h12M10 20h4"/></svg>Filters</button>
          <div class="spacer"></div>
          <span style="font-size:12.5px;color:var(--muted)">Sort: <b style="color:var(--text)">Recent activity</b></span>
        </div>
        <section class="card">
          <div class="tbl-wrap"><table>
            <thead><tr><th>Customer</th><th>Contact</th><th class="r">Open balance</th><th class="r">Lifetime</th><th>Last job</th><th>Status</th><th style="width:44px"></th></tr></thead>
            <tbody id="rows"></tbody>
          </table></div>
          <div class="pagination"><div class="info">Showing <span class="mono">1–10</span> of <span class="mono">312</span></div><div class="pg-btns"><button disabled>‹</button><button class="on">1</button><button>2</button><button>3</button><button>…</button><button>32</button><button>›</button></div></div>
        </section>
      </div>
    </main>
  </div>
</div>
<script src="shell.js" data-active="customers" data-title="Customers" data-primary="New customer"></script>
<script>
const C=[
  {n:'Northland Freight Ltd',e:'accounts@nlfreight.co.nz',p:'09 438 1100',bal:'0.00',life:'48,210',last:'14 Nov',s:'active'},
  {n:'Bay Plumbing Ltd',e:'admin@bayplumbing.nz',p:'021 554 200',bal:'2,480.00',life:'22,640',last:'02 Nov',s:'overdue'},
  {n:'Coastal Builders',e:'jobs@coastalbuild.co.nz',p:'09 401 7788',bal:'8,900.00',life:'112,300',last:'04 Nov',s:'active'},
  {n:'Whangarei Auto',e:'service@whgauto.nz',p:'09 430 2210',bal:'520.00',life:'9,180',last:'01 Nov',s:'overdue'},
  {n:'Te Awa Joinery',e:'office@teawa.co.nz',p:'027 880 4412',bal:'0.00',life:'67,420',last:'29 Oct',s:'active'},
  {n:'Harbour Electrical',e:'accounts@harbourelec.nz',p:'09 459 3300',bal:'0.00',life:'38,950',last:'27 Oct',s:'active'},
  {n:'M. Taufa',e:'m.taufa@gmail.com',p:'022 109 8845',bal:'640.00',life:'3,210',last:'08 Nov',s:'active'},
  {n:'K. Williams',e:'kwilliams@xtra.co.nz',p:'021 447 9920',bal:'0.00',life:'1,540',last:'05 Nov',s:'active'},
  {n:'J. Patel',e:'jpatel@me.com',p:'027 220 1180',bal:'0.00',life:'5,870',last:'30 Oct',s:'active'},
  {n:'R. Singh',e:'r.singh@outlook.com',p:'021 776 4400',bal:'1,150.00',life:'2,030',last:'04 Nov',s:'active'},
];
function init(c){const p=['#2F62F0','#1F8A5B','#E0683B','#6D5AE6','#B5740F'];let h=0;for(const ch of c)h=ch.charCodeAt(0)+((h<<5)-h);return p[Math.abs(h)%p.length];}
document.getElementById('rows').innerHTML=C.map(c=>`
  <tr class="clickable" onclick="location.href='CustomerDetail.html'">
    <td><div class="row-flex"><span class="avatar-sm" style="background:${init(c.n)}">${c.n.split(' ').map(w=>w[0]).slice(0,2).join('')}</span><span class="cust">${c.n}</span></div></td>
    <td><div class="cell-2"><span>${c.e}</span><span class="s mono">${c.p}</span></div></td>
    <td class="r amt" style="color:${c.bal!=='0.00'?'var(--danger)':'var(--muted-2)'}">$${c.bal}</td>
    <td class="r amt" style="color:var(--muted)">$${c.life}</td>
    <td class="mono" style="color:var(--muted)">${c.last}</td>
    <td><span class="badge ${c.s}"><span class="b-dot"></span>${c.s==='overdue'?'Overdue':'Active'}</span></td>
    <td><button class="icon-btn btn-sm" style="border:none;width:30px;height:30px" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg></button></td>
  </tr>`).join('');
</script>
</body>
</html>
