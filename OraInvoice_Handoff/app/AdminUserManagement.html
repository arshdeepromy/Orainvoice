<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="ds.css" />
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <div class="main">
    <div id="topbar"></div>
    <main class="content">
      <div class="page page-wide" data-screen-label="Admin · Users">
        <div class="page-head">
          <div><div class="eyebrow">Platform admin</div><h1>Platform users</h1><p class="sub">People with admin or staff access to the platform console</p></div>
          <div class="head-actions">
            <button class="btn btn-ghost btn-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>Export</button>
            <button class="btn btn-primary btn-sm" onclick="document.getElementById('inv').classList.add('open')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/><path d="M19 8v6M22 11h-6"/></svg>Invite admin</button>
          </div>
        </div>
        <div id="admin-nav" data-active="users"></div>

        <div class="kpis">
          <div class="kpi"><div class="top"><span class="label">Admin users</span><span class="ico blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 20h5v-2a3 3 0 00-5.4-1.9M17 20H7m10 0v-2c0-.7-.1-1.3-.4-1.9M7 20H2v-2a3 3 0 015.4-1.9"/></svg></span></div><div class="val">9</div><div class="delta"><span class="since">2 super admins</span></div></div>
          <div class="kpi"><div class="top"><span class="label">With 2FA</span><span class="ico green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a2 2 0 100-4 2 2 0 000 4zm6-5V7a6 6 0 00-12 0v3M5 10h14a1 1 0 011 1v9a1 1 0 01-1 1H5a1 1 0 01-1-1v-9a1 1 0 011-1z"/></svg></span></div><div class="val">8<span class="c"> / 9</span></div><div class="delta down"><span>1 missing</span><span class="since">enforce policy</span></div></div>
          <div class="kpi"><div class="top"><span class="label">Pending invites</span><span class="ico amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 6l-10 7L2 6m0 0v12a2 2 0 002 2h16a2 2 0 002-2V6"/></svg></span></div><div class="val">1</div><div class="delta"><span class="since">expires in 5d</span></div></div>
          <div class="kpi"><div class="top"><span class="label">Active today</span><span class="ico purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></span></div><div class="val">6</div><div class="delta"><span class="since">last 24h</span></div></div>
        </div>

        <div class="toolbar">
          <label class="search-input" style="flex:1;max-width:300px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-5-5m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input id="search" type="text" placeholder="Search users…" oninput="render()" /></label>
          <div class="seg" id="role-seg">
            <button class="on" data-r="">All roles</button><button data-r="super">Super admin</button><button data-r="support">Support</button><button data-r="billing">Billing</button>
          </div>
          <div class="spacer"></div>
        </div>

        <section class="card">
          <div class="tbl-wrap"><table>
            <thead><tr><th>User</th><th>Admin role</th><th>2FA</th><th>Last active</th><th>Status</th><th class="r">Actions</th></tr></thead>
            <tbody id="rows"></tbody>
          </table></div>
        </section>
      </div>
    </main>
  </div>
</div>

<div class="modal-scrim" id="inv">
  <div class="modal">
    <div class="modal-head"><h3>Invite admin user</h3><button class="x" onclick="document.getElementById('inv').classList.remove('open')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <div class="field" style="margin-bottom:16px"><label>Email address</label><input class="input" type="email" placeholder="name@orainvoice.co.nz" /></div>
      <div class="field"><label>Admin role</label><select class="select"><option>Support</option><option>Billing</option><option>Super admin</option></select></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="document.getElementById('inv').classList.remove('open')">Cancel</button><button class="btn btn-primary" onclick="document.getElementById('inv').classList.remove('open')">Send invite</button></div>
  </div>
</div>

<script src="shell.js" data-active="admin" data-title="Admin · Users"></script>
<script src="admin-nav.js"></script>
<script>
const U = [
  { n:'Arsh Randhawa', e:'arsh@orainvoice.co.nz', role:'super', mfa:true, last:'2m ago', st:'active', av:'#2F62F0' },
  { n:'Priya Nair', e:'priya@orainvoice.co.nz', role:'super', mfa:true, last:'1h ago', st:'active', av:'#6D5AE6' },
  { n:'Tom Becker', e:'tom@orainvoice.co.nz', role:'support', mfa:true, last:'3h ago', st:'active', av:'#1F8A5B' },
  { n:'Lena Ortiz', e:'lena@orainvoice.co.nz', role:'support', mfa:true, last:'5h ago', st:'active', av:'#B5740F' },
  { n:'Sam Wu', e:'sam@orainvoice.co.nz', role:'billing', mfa:true, last:'1d ago', st:'active', av:'#C8412F' },
  { n:'Ravi Shah', e:'ravi@orainvoice.co.nz', role:'support', mfa:false, last:'2d ago', st:'active', av:'#2F62F0' },
  { n:'Mia Donald', e:'mia@orainvoice.co.nz', role:'billing', mfa:true, last:'4d ago', st:'active', av:'#6D5AE6' },
  { n:'Jordan Lee', e:'jordan@orainvoice.co.nz', role:'support', mfa:true, last:'1w ago', st:'suspended', av:'#1F8A5B' },
  { n:'newhire@orainvoice.co.nz', e:'newhire@orainvoice.co.nz', role:'support', mfa:false, last:'—', st:'invited', av:'#97A0AE' },
];
const RL = { super:['danger','Super admin'], support:['sent','Support'], billing:['warn','Billing'] };
const ST = { active:['active','Active'], suspended:['draft','Suspended'], invited:['pending','Invited'] };
let role = '';
function render() {
  const q = (document.getElementById('search').value||'').toLowerCase();
  const list = U.filter(u => (!role||u.role===role) && (u.n.toLowerCase().includes(q)||u.e.toLowerCase().includes(q)));
  document.getElementById('rows').innerHTML = list.map(u => {
    const [rc,rl] = RL[u.role], [sc,sl] = ST[u.st];
    const init = u.n.includes('@') ? u.n[0].toUpperCase() : u.n.split(' ').map(x=>x[0]).slice(0,2).join('');
    return `<tr>
      <td><div class="row-flex"><span class="avatar-sm" style="background:${u.av}">${init}</span><div class="cell-2"><span class="cust">${u.n.includes('@')?'Pending user':u.n}</span><span class="s">${u.e}</span></div></div></td>
      <td><span class="badge ${rc}"><span class="b-dot"></span>${rl}</span></td>
      <td>${u.mfa?'<span class="badge active"><span class="b-dot"></span>On</span>':'<span class="badge overdue"><span class="b-dot"></span>Off</span>'}</td>
      <td class="mono" style="color:var(--muted)">${u.last}</td>
      <td><span class="badge ${sc}"><span class="b-dot"></span>${sl}</span></td>
      <td class="r"><button class="btn btn-ghost btn-sm">Manage</button></td>
    </tr>`;
  }).join('');
}
document.querySelectorAll('#role-seg button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#role-seg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');role=b.dataset.r;render();}));
document.getElementById('inv').addEventListener('click',e=>{if(e.target.id==='inv')e.target.classList.remove('open');});
render();
</script>
</body>
</html>
