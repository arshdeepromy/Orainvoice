# Standby PROD — local instance replicating from Pi primary (192.168.1.90)
# Usage: docker compose -p invoicing-standby-prod -f docker-compose.standby-prod.yml up -d
#
# Primary: Pi at 192.168.1.90:5432 (publication: orainvoice_ha_pub)
# Standby: This stack, localhost:8082 (app), localhost:5435 (postgres)
#
# Uses the same images already built by the dev stack — no rebuild needed.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workshoppro
    volumes:
      - sbprod_pgdata:/var/lib/postgresql/data
      - ./certs/pg/standby/server.crt:/pg-certs/server.crt:ro
      - ./certs/pg/standby/server.key:/pg-certs/server.key:ro
      - ./certs/pg/ca.crt:/pg-certs/ca.crt:ro
      - ./scripts/pg-ssl-entrypoint.sh:/pg-ssl-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/pg-ssl-entrypoint.sh"]
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "idle_in_transaction_session_timeout=30000"
      - "-c"
      - "statement_timeout=30000"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=150"
      - "-c"
      - "app.current_org_id="
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/var/lib/postgresql/ssl/server.crt"
      - "-c"
      - "ssl_key_file=/var/lib/postgresql/ssl/server.key"
      - "-c"
      - "ssl_ca_file=/var/lib/postgresql/ssl/ca.crt"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - sbprod_redisdata:/data
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.standby-prod
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/workshoppro
      REDIS_URL: redis://redis:6379/0
      HA_LOCAL_PG_PORT: "5435"
    volumes:
      - ./app:/app/app:delegated
      - ./alembic:/app/alembic:delegated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      --workers 2
      --bind 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 30
      --keep-alive 5
      --max-requests 5000
      --max-requests-jitter 500
      --access-logfile -
      --error-logfile -
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src:delegated
      - ./frontend/public:/app/public:delegated
      - ./frontend/index.html:/app/index.html:delegated
      - ./frontend/vite.config.ts:/app/vite.config.ts:delegated
      - ./frontend/tsconfig.json:/app/tsconfig.json:delegated
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:delegated
      - ./frontend/postcss.config.js:/app/postcss.config.js:delegated
      - ./frontend/watch-build.sh:/app/watch-build.sh:delegated
      - sbprod_frontend_dist:/app/dist
    depends_on:
      - app
    command: ["sh", "/app/watch-build.sh"]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - sbprod_frontend_dist:/usr/share/nginx/frontend:ro
    depends_on:
      - app
      - frontend

volumes:
  sbprod_pgdata:
  sbprod_redisdata:
  sbprod_frontend_dist:
