# Development overrides — hot-reload backend, source-mounted frontend
services:
  postgres:
    ports:
      - "5434:5432"

  redis:
    ports:
      - "6379:6379"

  app:
    environment:
      - PYTHONUNBUFFERED=1
      - WATCHFILES_FORCE_POLLING=true
      - HA_LOCAL_PG_PORT=5434
    volumes:
      - ./app:/app/app:delegated
      - ./alembic:/app/alembic:delegated
      - ./tests:/app/tests:delegated
      - ./scripts:/app/scripts:delegated
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-exclude "tests/*"
      --reload-exclude "scripts/*"

  frontend:
    volumes:
      - ./frontend/src:/app/src:delegated
      - ./frontend/public:/app/public:delegated
      - ./frontend/index.html:/app/index.html:delegated
      - ./frontend/vite.config.ts:/app/vite.config.ts:delegated
      - ./frontend/tsconfig.json:/app/tsconfig.json:delegated
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:delegated
      - ./frontend/postcss.config.js:/app/postcss.config.js:delegated
      - ./frontend/watch-build.sh:/app/watch-build.sh:delegated
      - frontend_dist:/app/dist
    # Watch source files and rebuild on change (uses Node fs.watch, works on Alpine)
    command: ["sh", "/app/watch-build.sh"]
