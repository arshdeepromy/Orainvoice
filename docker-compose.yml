services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-workshoppro}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./certs/pg/primary/server.crt:/pg-certs/server.crt:ro
      - ./certs/pg/primary/server.key:/pg-certs/server.key:ro
      - ./certs/pg/ca.crt:/pg-certs/ca.crt:ro
      - ./scripts/pg-ssl-entrypoint.sh:/pg-ssl-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/pg-ssl-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "shared_buffers=4GB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "effective_cache_size=10GB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "min_wal_size=512MB"
      - "-c"
      - "default_statistics_target=200"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_worker_processes=10"
      - "-c"
      - "huge_pages=try"
      - "-c"
      - "log_min_duration_statement=200"
      - "-c"
      - "jit=on"
      - "-c"
      - "idle_in_transaction_session_timeout=30000"
      - "-c"
      - "statement_timeout=30000"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "app.current_org_id="
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/var/lib/postgresql/ssl/server.crt"
      - "-c"
      - "ssl_key_file=/var/lib/postgresql/ssl/server.key"
      - "-c"
      - "ssl_ca_file=/var/lib/postgresql/ssl/ca.crt"
    deploy:
      resources:
        limits:
          memory: 6g
          cpus: '4.0'
    shm_size: '512m'

  # --- Redis ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save ""
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
      --io-threads 2
      --io-threads-do-reads yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: '1.0'

  # --- FastAPI Backend ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-workshoppro}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - compliance_files:/app/compliance_files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '4.0'

  # --- Frontend (builds static files, nginx serves them) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    volumes:
      - frontend_dist:/app/dist
    depends_on:
      - app

  # --- Mobile App (builds static files, nginx serves them) ---
  mobile:
    build:
      context: .
      dockerfile: mobile/Dockerfile
    restart: unless-stopped
    volumes:
      - mobile_dist:/app/dist
    depends_on:
      - app

  # --- Nginx gateway (single entry point) ---
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/frontend:ro
      - mobile_dist:/usr/share/nginx/mobile:ro
    depends_on:
      - app
      - frontend
      - mobile

volumes:
  pgdata:
  redisdata:
  frontend_dist:
  mobile_dist:
  compliance_files:
